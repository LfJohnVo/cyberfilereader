server {
  listen 80;
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # SPA: cualquier ruta desconocida vuelve a index.html
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }

  # Proxy hacia la API: "backend" es el nombre del servicio en Compose
  location /api/ {
    proxy_pass http://backend:5001/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 300s;      # respuestas largas del LLM en CPU
    proxy_buffering off;          # imprescindible si activas streaming SSE
  }
}
