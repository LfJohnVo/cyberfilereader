server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Activos con hash de contenido: cache larga e inmutable. Y si un archivo no
  # existe (p. ej. el navegador arrastra un index.html viejo en caché tras un
  # redeploy) devolvemos 404 limpio en vez de servir index.html como si fuera JS
  # — esa es la causa típica de la "pantalla en blanco" al actualizar.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA: cualquier ruta de navegación desconocida vuelve al index.html, que
  # NUNCA se cachea para que el navegador siempre cargue los hashes vigentes.
  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-cache";
  }

  # Proxy hacia la API: "backend" es el nombre del servicio en Compose
  location /api/ {
    proxy_pass http://backend:5001/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 300s;      # respuestas largas del LLM en CPU
    proxy_buffering off;          # imprescindible si activas streaming SSE
  }
}
